name: Every 6 Hours Weibo Update

on:
  schedule:
    # 每 6 小时（UTC :10），错开其它任务，避免同时 push
    # UTC 0/6/12/18 → 北京时间约 08:10 / 14:10 / 20:10 / 02:10
    - cron: "10 */6 * * *"
  workflow_dispatch:

concurrency:
  group: data-content-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-weibo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Weibo hot search
        run: python scripts/update_weibo.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content.json data/meta.json data/sources/ data/history/ data/manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: 6-hourly Weibo update"
            git pull --rebase origin main
            git push
          fi
