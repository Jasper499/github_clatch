name: Biweekly MRI Journal Update

on:
  schedule:
    # Day 1 and 15 UTC 02:00 (Beijing 10:00)
    - cron: "0 2 1,15 * *"
  workflow_dispatch:

concurrency:
  group: data-content-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-journals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch MRI journal articles
        env:
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
        run: python scripts/update_journals.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content.json data/meta.json data/sources/ data/history/ data/manifest.json papers/
          bash scripts/git_push_with_retry.sh "chore: biweekly MRI journal update"
