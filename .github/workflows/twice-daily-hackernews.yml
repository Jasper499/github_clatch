name: Twice-Daily Hacker News Update

on:
  schedule:
    # 每天 UTC 02:00、14:00（北京时间 10:00、22:00）
    - cron: "0 2,14 * * *"
  workflow_dispatch:

concurrency:
  group: data-content-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-hackernews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Hacker News
        run: python scripts/update_hackernews.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content.json data/history/ data/manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: twice-daily Hacker News update"
            git pull --rebase origin main
            git push
          fi
