name: Weekly Content Update

on:
  schedule:
    # 每周一 UTC 01:00（北京时间 09:00）
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch GitHub trending repos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_content.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content.json data/history/ data/manifest.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: weekly GitHub trending update"
            git push
          fi
