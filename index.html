<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="每周自动更新的 GitHub 热门项目与技术社区精选">
  <title>HJL· 自动获取最新内容网站</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>HJL 自动获取最新内容网站</h1>
      <p>按「本周 → 平台 → 分类」目录浏览，支持下拉快速定位条目。</p>
      <div class="meta-bar">
        <span class="badge live">已启用自动更新</span>
        <span class="badge">周期：<strong id="week-label">—</strong></span>
        <span class="badge">上次更新：<strong id="updated-at">—</strong></span>
      </div>
    </header>

    <div id="loading" class="loading-state">正在加载数据…</div>
    <div id="error" class="error-state" style="display:none"></div>

    <div id="app-layout" class="app-layout" hidden>
      <aside class="sidebar" aria-label="内容目录">
        <div class="sidebar-title">内容目录</div>
        <nav id="catalog-tree" class="catalog-tree"></nav>
      </aside>

      <main class="content-panel">
        <nav id="breadcrumb" class="breadcrumb" aria-label="当前位置"></nav>

        <div class="controls">
          <div class="control-group">
            <label for="category-select">子分类</label>
            <select id="category-select" class="select"></select>
          </div>
          <div class="control-group control-group-grow">
            <label for="item-select">条目列表</label>
            <select id="item-select" class="select"></select>
          </div>
        </div>

        <p id="section-desc" class="section-desc"></p>

        <article id="item-detail" class="item-detail" aria-live="polite"></article>

        <details class="compact-list-panel">
          <summary>展开完整列表（<span id="item-count">0</span> 条）</summary>
          <ul id="compact-list" class="compact-list"></ul>
        </details>
      </main>
    </div>

    <footer>
      <p>数据来源：GitHub · Hacker News · 微博 · MRI 顶刊（MRM/TMI/MedIA）· 微博每天更新 · 顶刊每半月更新</p>
      <p><a href="https://github.com" target="_blank" rel="noopener">GitHub</a> ·
         <a href="https://news.ycombinator.com" target="_blank" rel="noopener">Hacker News</a></p>
    </footer>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
