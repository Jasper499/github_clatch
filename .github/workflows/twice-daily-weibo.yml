name: Every 6 Hours Weibo Update

on:
  schedule:
    # Every 6 hours at UTC :10 (Beijing ~08:10 / 14:10 / 20:10 / 02:10)
    - cron: "10 */6 * * *"
  workflow_dispatch:

concurrency:
  group: data-content-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-weibo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch Weibo hot search
        run: python scripts/update_weibo.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/meta.json data/sources/ data/history/ data/manifest.json data/feeds/
          bash scripts/git_push_with_retry.sh "chore: 6-hourly Weibo update"
