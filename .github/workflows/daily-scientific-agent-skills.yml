name: Daily Scientific Agent Skills Update

on:
  schedule:
    # жҮЏе¤© UTC 02:40гЂ?4:40пә€еЊ—дғ¬ж—¶й—?10:40гЂ?2:40пә?
    - cron: "40 2,14 * * *"
  workflow_dispatch:

concurrency:
  group: data-content-update
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  update-scientific-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch scientific-agent-skills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_scientific_agent_skills.py

      - name: Commit and push if changed
        id: commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content.json data/meta.json data/sources/ data/history/ data/manifest.json data/scientific-agent-skills-notify.json
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No website data changes."
            exit 0
          fi

          git commit -m "chore: daily scientific-agent-skills update"

          # content.json еёёиұ«е…¶д»–ж Џз›®е№¶еЏ‘ж”№еЉЁпә›е†ІзҒЃж—¶дүқз•™жњ¬ж¬Ұ scientific з›ёе…іж–‡д»¶
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "Push succeeded on attempt ${attempt}."
              exit 0
            fi
            echo "Push/rebase failed on attempt ${attempt}, resolvingвЂ?
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            if git rebase origin/main; then
              continue
            fi
            # rebase е†ІзҒЃж—¶пәље…€жҺӨеЏ?upstream зљ?content/manifestпәЊе†Қй‡Қж–°еђ€е№¶жњ¬ж¬Ұ scientific жЉ“еЏ–
            git checkout --ours -- data/content.json data/manifest.json 2>/dev/null || true
            git add -- data/content.json data/manifest.json 2>/dev/null || true
            for path in \
              data/scientific-agent-skills-notify.json \
              data/history/scientificSkills \
              data/history/scientificSkillsCommits
            do
              git checkout --theirs -- "$path" 2>/dev/null || true
              git add -- "$path" 2>/dev/null || true
            done
            git diff --name-only --diff-filter=U | while read -r conflicted; do
              git checkout --ours -- "$conflicted" 2>/dev/null || true
              git add -- "$conflicted" 2>/dev/null || true
            done
            GITHUB_TOKEN="${GITHUB_TOKEN:-}" python scripts/update_scientific_agent_skills.py
            git add data/content.json data/meta.json data/sources/ data/history/ data/manifest.json data/scientific-agent-skills-notify.json
            GIT_EDITOR=true git rebase --continue || true
            sleep $((attempt * 2))
            continue
          done

          echo "Failed to push after retries" >&2
          exit 1

      - name: Notify via GitHub Issue
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python <<'PY'
          import json
          from pathlib import Path
          notify = json.loads(Path("data/scientific-agent-skills-notify.json").read_text(encoding="utf-8"))
          if not notify.get("changed"):
              print("Notify skipped: content SHA unchanged")
              raise SystemExit(0)
          latest = notify.get("latestCommit") or {}
          lines = [
              "## Scientific Agent Skills жњ‰ж›өж–?,
              "",
              f"- д»“еғ“пәљ[{notify.get('repo')}]({notify.get('repoUrl')})",
              f"- Starsпәљ{notify.get('stars')}",
              f"- Skills ж•°й‡Џпәљ{notify.get('skillCount')}",
              f"- жњЂж–°жЏђдғ¤пәљ[`{latest.get('sha')}`]({latest.get('url')}) {latest.get('title')}",
              f"- зҢ‘з«™е…ӨеЏӘпәљ{notify.get('siteUrl')}",
              "",
              "### жњЂиү‘жЏђдғ?,
              "",
          ]
          for c in notify.get("recentCommits") or []:
              lines.append(f"- [`{c.get('sha')}`]({c.get('url')}) {c.get('title')}")
          lines.extend([
              "",
              "---",
              "_жњ?Issue з”?GitHub Actions ењЁжӘЂжµ‹е€° `K-Dense-AI/scientific-agent-skills` ж›өж–°еђҺи‡ҒеЉЁе€›е»ғгЂ‚_",
          ])
          Path("/tmp/scientific-agent-skills-notify.md").write_text("\n".join(lines), encoding="utf-8")
          print("Notification body prepared.")
          PY
          TITLE="Scientific Agent Skills ж›өж–°йЂљзџӨ $(date -u +%Y-%m-%d)"
          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/scientific-agent-skills-notify.md \
            --label "scientific-skills-notify" || \
          gh issue create \
            --title "$TITLE" \
            --body-file /tmp/scientific-agent-skills-notify.md || \
          echo "Issue notify failed (non-blocking)."
