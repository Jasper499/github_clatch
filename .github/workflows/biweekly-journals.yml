name: Biweekly MRI Journal Update

on:
  schedule:
    # жѓПжЬИ 1 жЧ•гА?5 жЧ?UTC 02:00пЉИеМЧдЇђжЧґйЧ?10:00пЉ?
    - cron: "0 2 1,15 * *"
  workflow_dispatch:

concurrency:
  group: data-content-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-journals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch MRI journal articles
        env:
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
        run: python scripts/update_journals.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/content.json data/meta.json data/sources/ data/history/ data/manifest.json papers/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: biweekly MRI journal update"
            git pull --rebase origin main
            git push
          fi
